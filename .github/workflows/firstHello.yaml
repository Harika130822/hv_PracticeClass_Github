name: My First Workflow

on: 
    workflow_dispatch: 
        inputs: 
            my_input:
                type: string
                description: My manual Input
    push:
        branches:
            - main

jobs:

    first-run:
        runs-on: ubuntu-latest

        steps:

            - name: Checkout Repository
              uses: actions/checkout@v6


            - name: Say Hello
              run: |
                echo "Hello World"
                echo "This is my first workflow"
                pwd
                chmod +x scripts/script.sh
                cd scripts
                ./script.sh
                echo "My manual input is ${{ inputs.my_input }}"
                echo "My First Secret is ${{ secrets.TEST_SECRET }}"
                echo "My First variable is ${{ vars.FIRST_VARIABLE }}"
            
            - name: Print GitHub context info
              run: |
                echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
                echo "TIMESTAMP=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV
                echo "## Build Results" >> $GITHUB_STEP_SUMMARY
                echo "## Build Results" >> $GITHUB_STEP_SUMMARY
                echo "============================================"
                echo "  GITHUB ACTIONS CONTEXT INFORMATION"
                echo "============================================"
                echo "  Who triggered this run: ${{ github.actor }}"
                echo "  What triggered it:      ${{ github.event_name }}"
                echo "  Branch / Ref:           ${{ github.ref }}"
                echo "  Commit SHA:             ${{ github.sha }}"
                echo "  Repository:             ${{ github.repository }}"
                echo "  Run number:             ${{ github.run_number }}"
                echo "  Run ID:                 ${{ github.run_id }}"
                echo "============================================"

    second-run:
        runs-on: ubuntu-latest
        needs: first-run

        steps:

            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Say Hello Again
              run: |
                echo "Hello Again World"
                echo "This is my second job in the workflow"
                pwd
    
    third-run:
        runs-on: ubuntu-latest
        needs: [first-run, second-run]
        if: failure()

        steps:

            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Say Hello Again Again
              run: |
                echo "Hello Again Again World"
                echo "This is my third job in the workflow"
                pwd





