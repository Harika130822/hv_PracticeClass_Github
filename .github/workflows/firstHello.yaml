name: My First Workflow

on: 
    workflow_dispatch: 
        inputs: 
            my_input:
                type: string
                description: My manual Input
    push:
        branches:
            - main

jobs:

    first-run:
        runs-on: ubuntu-latest

        steps:

            - name: Checkout Repository
              uses: actions/checkout@v6


            - name: Say Hello
              run: |
                echo "Hello World"
                echo "This is my first workflow"
                pwd
                chmod +x .github/workflows/scripts/script.sh
                cd .github/workflows/scripts
                ./script.sh
                echo "My manual input is ${{ inputs.my_input }}"
                echo "My First Secret is ${{ secrets.TEST_SECRET }}"
                echo "My First variable is ${{ vars.FIRST_VARIABLE }}"
            
            - name: Print GitHub context info
              run: |
                STEP_SUMMARY=""
                STEP_SUMMARY+="VERSION=${GITHUB_SHA}\n"
                STEP_SUMMARY+="TIMESTAMP=$(date -u +%Y%m%d%H%M%S)\n"
                STEP_SUMMARY+="## Build Results\n"
                STEP_SUMMARY+="## Test\n"
                STEP_SUMMARY+="============================================\n"
                STEP_SUMMARY+="  GITHUB ACTIONS CONTEXT INFORMATION\n"
                STEP_SUMMARY+="============================================\n"
                STEP_SUMMARY+="  Who triggered this run: ${GITHUB_ACTOR}\n"
                STEP_SUMMARY+="  What triggered it:      ${GITHUB_EVENT_NAME}\n"
                STEP_SUMMARY+="  Branch / Ref:           ${GITHUB_REF}\n"
                STEP_SUMMARY+="  Commit SHA:             ${GITHUB_SHA}\n"
                STEP_SUMMARY+="  Repository:             ${GITHUB_REPOSITORY}\n"
                STEP_SUMMARY+="  Run number:             ${GITHUB_RUN_NUMBER}\n"
                STEP_SUMMARY+="  Run ID:                 ${GITHUB_RUN_ID}\n"
                STEP_SUMMARY+="============================================\n"
                echo -e "$STEP_SUMMARY"
                echo -e "$TIMESTAMP"

    second-run:
        runs-on: ubuntu-latest
        # needs: first-run

        steps:

            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Say Hello Again
              run: |
                echo "Hello Again World"
                echo "This is my second job in the workflow"
                pwd
    
    third-run:
        runs-on: ubuntu-latest
        #needs: [first-run, second-run]
        # if: failure()

        steps:

            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Say Hello Again Again
              run: |
                echo "Hello Again Again World"
                echo "This is my third job in the workflow"
                pwd





